name: Build geo-files and Happ routing

on:
  schedule:
    - cron: "20 4 * * *"   # ежедневно 04:20 UTC (07:20 МСК)
  workflow_dispatch:        # ручной запуск из вкладки Actions
  push:
    branches: [main]
    paths:
      - "config/**"
      - "custom/**"
      - "scripts/**"
      - ".github/workflows/build.yml"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: false

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Generate lists from opencck
        run: python3 scripts/fetch_opencck.py --outdir build

      - name: Build geosite.dat
        run: |
          git clone --depth 1 https://github.com/v2fly/domain-list-community.git dlc
          git clone --depth 1 https://github.com/hydraponique/roscomvpn-geosite.git rvpn-geosite
          # кастомные категории RoscomVPN (whitelist, twitch-ads, faceit и т.д.)
          # поверх полного набора v2fly + наша категория russia-inside
          cp -f rvpn-geosite/data/* dlc/data/
          cp -f build/russia-inside dlc/data/russia-inside
          mkdir -p "$GITHUB_WORKSPACE/release"
          cd dlc
          go run ./ --datapath=./data --outputname=geosite.dat --outputdir="$GITHUB_WORKSPACE/release"

      - name: Build geoip.dat
        run: |
          git clone --depth 1 https://github.com/v2fly/geoip.git geoip-tool
          # базовый geoip RoscomVPN (категории direct/private) + наши CIDR
          curl -fsSL -o geoip-tool/upstream-geoip.dat \
            https://github.com/hydraponique/roscomvpn-geoip/releases/latest/download/geoip.dat
          cp build/russia-inside.txt geoip-tool/russia-inside.txt
          cat > geoip-tool/config-custom.json <<'EOF'
          {
            "input": [
              { "type": "v2rayGeoIPDat", "action": "add", "args": { "uri": "./upstream-geoip.dat" } },
              { "type": "text", "action": "add", "args": { "name": "russia-inside", "uri": "./russia-inside.txt" } },
              { "type": "private", "action": "add" }
            ],
            "output": [
              { "type": "v2rayGeoIPDat", "action": "output", "args": { "outputDir": "./output", "outputName": "geoip.dat" } }
            ]
          }
          EOF
          cd geoip-tool
          go run ./ -c config-custom.json
          cp output/geoip.dat "$GITHUB_WORKSPACE/release/geoip.dat"

      - name: Check for changes
        id: changes
        run: |
          if [ "${{ github.event_name }}" = "schedule" ] && [ -z "$(git status --porcelain -- release)" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "Геофайлы не изменились — пропускаем релиз"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build Happ routing profile
        if: steps.changes.outputs.skip == 'false'
        id: routing
        run: |
          TAG="$(date -u +%Y%m%d%H%M)"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          python3 scripts/build_routing.py --tag "$TAG"
          pip install --quiet qrcode pillow
          python3 -c 'import qrcode; qrcode.make(open("HAPP/ROUTING.DEEPLINK").read().strip()).save("HAPP/ROUTING.QR.png")'

      - name: Commit and tag
        if: steps.changes.outputs.skip == 'false'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add release HAPP
          git commit -m "build: ${{ steps.routing.outputs.tag }}"
          git tag "${{ steps.routing.outputs.tag }}"
          git push origin HEAD --follow-tags

      - name: Publish GitHub Release
        if: steps.changes.outputs.skip == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.routing.outputs.tag }}
          files: |
            release/geosite.dat
            release/geoip.dat
